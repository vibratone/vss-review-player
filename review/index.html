<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vibratone Mix Review</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="review-header" aria-label="Review session">
        <div>
          <p class="eyebrow">Vibratone Sound Studio</p>
          <h1 id="sessionTitle">Mix Review</h1>
        </div>
        <div class="session-meta">
          <span id="clientName">Client</span>
          <span id="songName">Song</span>
          <span id="sessionStatus">Loading</span>
        </div>
      </section>

      <section class="status-bar" id="statusBar" role="status">
        Loading review session...
      </section>

      <section class="review-layout" hidden id="reviewLayout">
        <div class="player-panel">
          <div class="version-tabs" id="versionTabs" aria-label="Mix versions"></div>

          <div class="now-playing">
            <div>
              <p class="label">Selected version</p>
              <h2 id="selectedVersionLabel">Version</h2>
            </div>
            <p id="timeLabel">00:00</p>
          </div>

          <audio id="audioPlayer" controls preload="metadata"></audio>
        </div>

        <form class="comment-panel" id="commentForm">
          <div class="form-row">
            <label for="category">Category</label>
            <select id="category">
              <option>General</option>
              <option>Vocal</option>
              <option>Balance</option>
              <option>Timing</option>
              <option>FX</option>
              <option>Arrangement</option>
              <option>Other</option>
            </select>
          </div>

          <div class="form-row">
            <label for="commentText">Comment</label>
            <textarea id="commentText" rows="5" placeholder="Add a note for this exact moment in the track"></textarea>
          </div>

          <div class="actions-row">
            <button type="button" id="addCommentButton">Add Timestamped Note</button>
            <button type="button" id="submitReviewButton">Submit Review</button>
          </div>
        </form>

        <section class="comments-panel" aria-label="Review comments">
          <div class="section-heading">
            <h2>Review Notes</h2>
            <span id="commentCount">0 notes</span>
          </div>
          <div id="commentsList" class="comments-list"></div>
        </section>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
